{{define "dashboard"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 to-slate-800 min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-white">Payment Dashboard</h1>
                <p class="text-slate-400 mt-1">Real-time payment monitoring</p>
            </div>
            <div class="flex gap-4">
                <a href="/" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-lg transition">← Back to Payment</a>
                <button hx-get="/api/dashboard/html" hx-trigger="load, every 5s" hx-swap="innerHTML" hx-target="#dashboard-content" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition">Refresh</button>
            </div>
        </div>
        
        <div class="bg-white/10 backdrop-blur rounded-xl border border-white/20 overflow-hidden mb-8" id="dashboard-content">
            {{template "dashboard_html" .}}
        </div>
        
        <div class="mt-4 text-center text-slate-500 text-sm">Auto-refreshing every 5 seconds</div>
    </div>
</body>
</html>
{{end}}

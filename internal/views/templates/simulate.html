{{define "simulate"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Payment - PayMob</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white/10 backdrop-blur-xl rounded-3xl shadow-2xl p-8 w-full max-w-md border border-white/20">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-br from-amber-400 to-orange-500 rounded-full mb-4 shadow-lg">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
                </svg>
            </div>
            <div class="inline-block px-3 py-1 bg-amber-500/20 rounded-full text-amber-300 text-xs font-semibold mb-3">DEMO MODE</div>
            <h1 class="text-2xl font-bold text-white">Simulate Payment</h1>
            <p class="text-slate-400 mt-2">This is a demo payment simulation</p>
        </div>
        
        <div class="bg-white/5 rounded-2xl p-6 mb-6 border border-white/10">
            <div class="flex justify-between items-center mb-4">
                <span class="text-slate-400">Amount</span>
                <span class="text-2xl font-bold text-white">{{.Amount | formatAmount}} {{.Currency}}</span>
            </div>
            <div class="flex justify-between items-center mb-4">
                <span class="text-slate-400">Order ID</span>
                <span class="text-sm font-mono text-slate-300">{{.OrderID}}</span>
            </div>
            <div class="flex justify-between items-center">
                <span class="text-slate-400">Status</span>
                <span class="px-2 py-1 text-xs font-semibold rounded-full {{.Status | statusClass}}">{{.Status | statusText}}</span>
            </div>
        </div>

        <div class="space-y-3">
            <button onclick="simulateSuccess()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-4 rounded-xl font-semibold hover:from-green-600 hover:to-emerald-700 transition-all transform hover:scale-[1.02] shadow-lg">
                ✓ Simulate Success
            </button>
            <button onclick="simulateFailure()" class="w-full bg-gradient-to-r from-red-500 to-rose-600 text-white py-4 rounded-xl font-semibold hover:from-red-600 hover:to-rose-700 transition-all transform hover:scale-[1.02] shadow-lg">
                ✗ Simulate Failure
            </button>
            <a href="/dashboard" class="block w-full bg-white/10 text-white py-3 rounded-xl font-semibold hover:bg-white/20 transition-all text-center border border-white/20">
                ← Back to Dashboard
            </a>
        </div>
    </div>

    <script>
        const orderID = "{{.OrderID}}";
        
        async function simulateSuccess() {
            try {
                const response = await fetch('/api/simulate/' + orderID, { method: 'POST' });
                if (response.ok) {
                    window.location.href = '/success?order_id=' + orderID;
                }
            } catch (err) {
                alert('Failed to simulate success');
            }
        }
        
        async function simulateFailure() {
            try {
                const response = await fetch('/api/simulate-failure/' + orderID, { method: 'POST' });
                if (response.ok) {
                    window.location.href = '/failure?order_id=' + orderID;
                }
            } catch (err) {
                alert('Failed to simulate failure');
            }
        }
    </script>
</body>
</html>
{{end}}

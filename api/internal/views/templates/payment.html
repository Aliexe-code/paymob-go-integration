{{define "payment"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PayMob - Payment</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        .input-field {
            width: 100%;
            padding: 12px 16px;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            color: #1f2937;
            transition: all 0.2s ease;
            outline: none;
        }
        .input-field:focus {
            background: white;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
        }
        #amount {
            font-size: 1.125rem;
            font-weight: 600;
        }
        .pay-button {
            background: linear-gradient(135deg, #7c3aed 0%, #6366f1 100%);
            transition: all 0.2s ease;
        }
        .pay-button:hover {
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }
        .pay-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .spinner {
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .amount-presets {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .amount-preset {
            padding: 4px 12px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            font-size: 0.875rem;
            color: #6b7280;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .amount-preset:hover {
            background: #7c3aed;
            color: white;
            border-color: #7c3aed;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-xl shadow-lg p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Payment</h2>

            <form hx-post="/api/payments" hx-target="#result" hx-swap="innerHTML"
                  class="space-y-4" id="paymentForm"
                  hx-on::before-request="document.getElementById('payBtn').disabled = true; document.getElementById('btnText').textContent = 'Processing...'; document.getElementById('spinner').classList.remove('hidden');"
                  hx-on::after-request="document.getElementById('payBtn').disabled = false; document.getElementById('btnText').textContent = 'Pay Now'; document.getElementById('spinner').classList.add('hidden');">

                <div>
                    <label for="amount" class="block text-sm font-medium text-gray-700 mb-1">Amount (EGP)</label>
                    <input type="number" name="amount" id="amount" required min="1" step="1"
                           class="input-field" placeholder="0" oninput="updatePresets(this.value)">
                    <div class="amount-presets">
                        <button type="button" class="amount-preset" onclick="setAmount(100)">100</button>
                        <button type="button" class="amount-preset" onclick="setAmount(250)">250</button>
                        <button type="button" class="amount-preset" onclick="setAmount(500)">500</button>
                        <button type="button" class="amount-preset" onclick="setAmount(1000)">1000</button>
                    </div>
                </div>

                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                    <input type="text" name="name" id="name" required class="input-field" minlength="3">
                </div>

                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" name="email" id="email" required class="input-field">
                </div>

                <div>
                    <label for="phone" class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
                    <input type="tel" name="phone" id="phone" required class="input-field" placeholder="+20 100 000 0000" pattern="[0-9+\s\-]{10,}">
                </div>

                <button type="submit" id="payBtn"
                        class="pay-button w-full text-white py-3 rounded-lg font-semibold flex items-center justify-center gap-2">
                    <span id="spinner" class="spinner hidden"></span>
                    <span id="btnText">Pay Now</span>
                </button>
            </form>

            <div id="result" class="mt-4"></div>

            <div class="mt-4 pt-4 border-t border-gray-200 flex justify-between items-center">
                <span class="text-xs text-gray-400">Powered by PayMob</span>
                <a href="/dashboard" class="text-sm font-medium text-purple-600 hover:text-purple-800">Dashboard</a>
            </div>
        </div>
    </div>

    <script>
        function setAmount(value) {
            document.getElementById('amount').value = value;
            updatePresets(value);
        }
        function updatePresets(value) {
            document.querySelectorAll('.amount-preset').forEach(preset => {
                const presetValue = preset.textContent.replace(/[^0-9]/g, '');
                if (presetValue === value) {
                    preset.style.background = '#7c3aed';
                    preset.style.color = 'white';
                    preset.style.borderColor = '#7c3aed';
                } else {
                    preset.style.background = '#f3f4f6';
                    preset.style.color = '#6b7280';
                    preset.style.borderColor = '#e5e7eb';
                }
            });
        }
    </script>
</body>
</html>
{{end}}
